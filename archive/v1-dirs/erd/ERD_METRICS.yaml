# ─────────────────────────────────────────────────────────────────────────────────
# HUB IDENTITY
# ─────────────────────────────────────────────────────────────────────────────────
hub:
  hub_id: client-subhive
  hub_name: Client Intake & Vendor Export System
  sovereign_id: imo-creator
  erd_version: "2.3.0"
  schema: clnt
  database: Neon PostgreSQL
  adr: ADR-002-ctb-consolidated-backbone, ADR-004-renewal-downgraded-to-plan-support, ADR-005-client-projection-support

# ─────────────────────────────────────────────────────────────────────────────────
# TABLE METRICS (CTB Spoke Structure)
# ─────────────────────────────────────────────────────────────────────────────────
tables:
  s1_hub:
    - table_name: clnt.client
      description: Sovereign client identity and configuration (SPINE)
      spoke: S1
      leaf_type: CANONICAL
      count: 0
      query: SELECT COUNT(*) FROM clnt.client
    - table_name: clnt.client_error
      description: Client-level errors
      spoke: S1
      leaf_type: ERROR
      count: 0
      query: SELECT COUNT(*) FROM clnt.client_error
  s2_plan:
    - table_name: clnt.plan
      description: Benefit plans with fixed cost tiers (canonical source of truth for active rates)
      spoke: S2
      leaf_type: CANONICAL
      count: 0
      query: SELECT COUNT(*) FROM clnt.plan
    - table_name: clnt.plan_error
      description: Plan-level errors
      spoke: S2
      leaf_type: ERROR
      count: 0
      query: SELECT COUNT(*) FROM clnt.plan_error
    - table_name: clnt.plan_quote
      description: Quote tracking
      spoke: S2
      leaf_type: SUPPORT
      count: 0
      query: SELECT COUNT(*) FROM clnt.plan_quote
  s3_employee:
    - table_name: clnt.person
      description: Employee/dependent identity
      spoke: S3
      leaf_type: CANONICAL
      count: 0
      query: SELECT COUNT(*) FROM clnt.person
    - table_name: clnt.employee_error
      description: Employee-level errors
      spoke: S3
      leaf_type: ERROR
      count: 0
      query: SELECT COUNT(*) FROM clnt.employee_error
    - table_name: clnt.election
      description: Person-plan bridge
      spoke: S3
      leaf_type: SUPPORT
      count: 0
      query: SELECT COUNT(*) FROM clnt.election
    - table_name: clnt.enrollment_intake
      description: Enrollment batch header
      spoke: S3
      leaf_type: STAGING
      count: 0
      query: SELECT COUNT(*) FROM clnt.enrollment_intake
    - table_name: clnt.intake_record
      description: Raw intake payload
      spoke: S3
      leaf_type: STAGING
      count: 0
      query: SELECT COUNT(*) FROM clnt.intake_record
  s4_vendor:
    - table_name: clnt.vendor
      description: Vendor identity per client
      spoke: S4
      leaf_type: CANONICAL
      count: 0
      query: SELECT COUNT(*) FROM clnt.vendor
    - table_name: clnt.vendor_error
      description: Vendor-level errors
      spoke: S4
      leaf_type: ERROR
      count: 0
      query: SELECT COUNT(*) FROM clnt.vendor_error
    - table_name: clnt.external_identity_map
      description: Internal-to-external ID translation
      spoke: S4
      leaf_type: SUPPORT
      count: 0
      query: SELECT COUNT(*) FROM clnt.external_identity_map
    - table_name: clnt.invoice
      description: Vendor invoices
      spoke: S4
      leaf_type: SUPPORT
      count: 0
      query: SELECT COUNT(*) FROM clnt.invoice
  s5_service:
    - table_name: clnt.service_request
      description: Service ticket tracking
      spoke: S5
      leaf_type: CANONICAL
      count: 0
      query: SELECT COUNT(*) FROM clnt.service_request
    - table_name: clnt.service_error
      description: Service-level errors
      spoke: S5
      leaf_type: ERROR
      count: 0
      query: SELECT COUNT(*) FROM clnt.service_error

# ─────────────────────────────────────────────────────────────────────────────────
# VIEWS (Read-only, no table storage)
