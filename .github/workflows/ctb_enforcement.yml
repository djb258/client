name: CTB Enforcement Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────
  # Gate A: Registry-First Enforcement
  # Every table in code must exist in column_registry.yml
  # Doctrine: CTB_REGISTRY_ENFORCEMENT.md §3
  # ─────────────────────────────────────────────────────────
  registry-gate:
    name: "Gate A: Registry-First"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CTB Registry Gate
        run: |
          chmod +x scripts/ctb-registry-gate.sh
          bash scripts/ctb-registry-gate.sh

  # ─────────────────────────────────────────────────────────
  # Gate B: Banned DB Client Detection
  # No direct DB clients outside Gatekeeper module
  # Doctrine: CTB_REGISTRY_ENFORCEMENT.md §5.3
  # ─────────────────────────────────────────────────────────
  banned-clients:
    name: "Gate B: Banned DB Clients"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Banned DB Clients
        run: |
          chmod +x scripts/detect-banned-db-clients.sh
          bash scripts/detect-banned-db-clients.sh

  # ─────────────────────────────────────────────────────────
  # Gate C: Governance File Verification
  # All required governance files must exist and be non-empty
  # Doctrine: FAIL_CLOSED_CI_CONTRACT.md §7
  # ─────────────────────────────────────────────────────────
  governance-check:
    name: "Gate C: Governance Files"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Governance Files
        run: |
          chmod +x scripts/verify-governance-ci.sh
          bash scripts/verify-governance-ci.sh

  # ─────────────────────────────────────────────────────────
  # Gate D: CTB Drift Audit
  # Detect structural drift between registry and live state
  # Doctrine: CTB_REGISTRY_ENFORCEMENT.md §6
  # ─────────────────────────────────────────────────────────
  drift-audit:
    name: "Gate D: CTB Drift Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CTB Drift Audit
        run: |
          chmod +x scripts/ctb-drift-audit.sh
          bash scripts/ctb-drift-audit.sh

  # ─────────────────────────────────────────────────────────
  # Gate E: Enforcement Summary
  # All gates must pass — no continue-on-error
  # Doctrine: FAIL_CLOSED_CI_CONTRACT.md §1-2
  # ─────────────────────────────────────────────────────────
  enforcement-summary:
    name: "Enforcement Summary"
    runs-on: ubuntu-latest
    needs: [registry-gate, banned-clients, governance-check, drift-audit]
    steps:
      - name: All Gates Passed
        run: |
          echo "All CTB enforcement gates passed."
          echo ""
          echo "Gate A: Registry-First ........ PASS"
          echo "Gate B: Banned DB Clients ..... PASS"
          echo "Gate C: Governance Files ...... PASS"
          echo "Gate D: CTB Drift Audit ....... PASS"
          echo ""
          echo "Doctrine: FAIL_CLOSED_CI_CONTRACT.md"
          echo "Version: 3.4.0"
