# Neon Schema Migration Workflow
# Applies migration chain from db/neon/migrations/ to Neon PostgreSQL
# Schema: clnt (16 tables, 5 spokes)

name: Apply Neon Migrations

on:
  push:
    branches: [main]
    paths:
      - 'db/neon/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Validate migration files exist
        run: |
          MIGRATION_DIR="db/neon/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "ERROR: Migration directory $MIGRATION_DIR not found"
            exit 1
          fi
          SQL_COUNT=$(find "$MIGRATION_DIR" -name "*.sql" | wc -l)
          echo "Found $SQL_COUNT migration files in $MIGRATION_DIR"
          if [ "$SQL_COUNT" -eq 0 ]; then
            echo "ERROR: No SQL migration files found"
            exit 1
          fi

      - name: Apply migrations in order
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          echo "Applying migrations to Neon database..."

          # Test connection
          if ! psql "$DATABASE_URL" -c "SELECT 1;" > /dev/null 2>&1; then
            echo "ERROR: Cannot connect to database"
            exit 1
          fi
          echo "Database connection verified."

          # Apply each migration in numerical order
          for migration in $(find db/neon/migrations -name "*.sql" | sort); do
            echo "Applying: $migration"
            if ! psql "$DATABASE_URL" -f "$migration"; then
              echo "ERROR: Failed to apply $migration"
              exit 1
            fi
            echo "  Applied successfully."
          done

      - name: Verify clnt schema
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          echo "Verifying clnt schema..."
          TABLES=$(psql "$DATABASE_URL" -t -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'clnt' ORDER BY table_name;")
          echo "Tables in clnt schema:"
          echo "$TABLES"
          TABLE_COUNT=$(echo "$TABLES" | grep -c '[a-z]' || true)
          echo "Total tables: $TABLE_COUNT"

          if [ "$TABLE_COUNT" -lt 16 ]; then
            echo "WARNING: Expected 16 tables, found $TABLE_COUNT"
          else
            echo "Schema verification passed."
          fi
