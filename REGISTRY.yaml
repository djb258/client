# ===============================================================================
# REGISTRY — Hub Identity Declaration
# ===============================================================================
# Authority: imo-creator (Inherited)
# Status: REQUIRED — Every hub MUST have a REGISTRY.yaml
# ===============================================================================

version: "3.4.0"
last_updated: "2026-02-25"

# ===============================================================================
# HUB IDENTITY (CC-02)
# ===============================================================================

hub:
  hub_id: "client-subhive"
  hub_name: "Client Intake & Vendor Export System"
  description: "Manages client data intake, transforms to canonical schema, and exports to vendor-specific formats"
  owner: "Barton Ops System"
  sovereign_reference: "imo-creator"

# ===============================================================================
# CONFORMANCE
# ===============================================================================

conformance:
  parent: "imo-creator"
  doctrine_version: "3.4.0"
  ctb_version: "3.4.0"
  upstream_commit: "08b734d"
  domain_spec: "doctrine/REPO_DOMAIN_SPEC.md"
  osam: "doctrine/OSAM.md"
  column_registry: "src/data/db/registry/clnt_column_registry.yml"

# ===============================================================================
# CTB PLACEMENT
# ===============================================================================

ctb:
  branches_used:
    sys: true
    data: true
    app: true
    ai: true
    ui: true

# ===============================================================================
# SUB-HUBS / SPOKES (v3.0.0 — 5 Spokes, 16 Tables)
# ===============================================================================
# OWN-10a: Each spoke has exactly 1 CANONICAL table
# OWN-10b: Each spoke has exactly 1 ERROR table
# OWN-10c: Additional tables (SUPPORT, STAGING) require ADR justification

subhubs:
  - subhub_id: "s1-hub"
    name: "S1: Hub"
    description: "Root client identity and configuration (SPINE)"
    tables:
      - name: "clnt.client"
        leaf_type: "CANONICAL"
      - name: "clnt.client_error"
        leaf_type: "ERROR"

  - subhub_id: "s2-plan"
    name: "S2: Plan"
    description: "Benefit plans, rates, and quote intake"
    tables:
      - name: "clnt.plan"
        leaf_type: "CANONICAL"
      - name: "clnt.plan_error"
        leaf_type: "ERROR"
      - name: "clnt.plan_quote"
        leaf_type: "SUPPORT"

  - subhub_id: "s3-employee"
    name: "S3: Employee"
    description: "Employee identity, elections, and enrollment intake"
    tables:
      - name: "clnt.person"
        leaf_type: "CANONICAL"
      - name: "clnt.employee_error"
        leaf_type: "ERROR"
      - name: "clnt.election"
        leaf_type: "SUPPORT"
      - name: "clnt.enrollment_intake"
        leaf_type: "STAGING"
      - name: "clnt.intake_record"
        leaf_type: "STAGING"

  - subhub_id: "s4-vendor"
    name: "S4: Vendor"
    description: "Vendor identity, ID translation, and billing"
    tables:
      - name: "clnt.vendor"
        leaf_type: "CANONICAL"
      - name: "clnt.vendor_error"
        leaf_type: "ERROR"
      - name: "clnt.external_identity_map"
        leaf_type: "SUPPORT"
      - name: "clnt.invoice"
        leaf_type: "SUPPORT"

  - subhub_id: "s5-service"
    name: "S5: Service"
    description: "Service ticket tracking and dashboards"
    tables:
      - name: "clnt.service_request"
        leaf_type: "CANONICAL"
      - name: "clnt.service_error"
        leaf_type: "ERROR"

# ===============================================================================
# SPOKES (CC-03 Interfaces)
# ===============================================================================

spokes:
  ingress:
    - spoke_id: "api-intake"
      name: "API Intake Endpoint"
      contract: "Zod schema validation"

  egress:
    - spoke_id: "vendor-export"
      name: "Vendor Export Interface"
      contract: "vendor_output_blueprint schema"

    - spoke_id: "compliance-report"
      name: "Compliance Reporting"
      contract: "compliance_flag schema"

# ===============================================================================
# SCHEMA
# ===============================================================================

schema:
  name: "clnt"
  database: "Neon PostgreSQL"
  total_tables: 16
  total_views: 0
  universal_join_key: "client_id"
  spine_table: "clnt.client"

# ===============================================================================
# ENFORCEMENT (v3.0.0 — Registry-First + Fail-Closed)
# ===============================================================================

enforcement:
  registry_first: true
  column_registry: "src/data/db/registry/clnt_column_registry.yml"
  codegen_script: "scripts/codegen-schema.ts"
  gatekeeper_module: "src/sys/modules/gatekeeper/"
  enforcement_scripts:
    - "scripts/ctb-registry-gate.sh"
    - "scripts/ctb-drift-audit.sh"
    - "scripts/detect-banned-db-clients.sh"
    - "scripts/verify-governance-ci.sh"
    - "scripts/bootstrap-audit.sh"
  binding_doctrine:
    - "templates/doctrine/CTB_REGISTRY_ENFORCEMENT.md"
    - "templates/doctrine/EXECUTION_SURFACE_LAW.md"
    - "templates/doctrine/FAIL_CLOSED_CI_CONTRACT.md"
    - "templates/doctrine/LEGACY_COLLAPSE_PLAYBOOK.md"

# ===============================================================================
# DOCUMENT CONTROL
# ===============================================================================

document_control:
  created: "2026-01-30"
  last_modified: "2026-02-25"
  status: "ACTIVE"
